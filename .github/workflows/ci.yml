name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20']   # engines: node >=18 — verify the floor and the current LTS
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # Reproducible install from the committed package-lock.json (fails if lock and package.json disagree).
      - name: Install (reproducible)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      # NOTE: `npm run verify:live` is intentionally NOT run in CI — it hits live BCH2 mainnet (network +
      # non-deterministic tip). Run it manually as a release smoke check.
